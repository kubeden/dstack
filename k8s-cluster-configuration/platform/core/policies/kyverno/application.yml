apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    targetRevision: main
    path: k8s-cluster-configuration/platform/core/policies/kyverno/base
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.versions[]?.schema?.openAPIV3Schema
        - .metadata.labels
    - group: kyverno.io
      kind: ClusterPolicy
      jqPathExpressions:
        - .status
        - .metadata.labels
        - .spec.rules[]?.skipBackgroundRequests
        - .spec.validationFailureAction
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
