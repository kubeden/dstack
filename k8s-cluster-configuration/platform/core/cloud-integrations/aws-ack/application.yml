apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-ack
  namespace: argocd
spec:
  project: default
  source:
    targetRevision: main
    path: k8s-cluster-configuration/platform/core/cloud-integrations/aws-ack/base
  destination:
    server: https://kubernetes.default.svc
    namespace: ack-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
