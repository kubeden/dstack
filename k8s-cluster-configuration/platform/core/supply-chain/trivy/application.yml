apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    targetRevision: main
    path: k8s-cluster-configuration/platform/core/supply-chain/trivy/base
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
