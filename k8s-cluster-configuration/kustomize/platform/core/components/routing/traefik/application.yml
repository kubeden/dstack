apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/routing/traefik/base
  destination:
    namespace: traefik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
