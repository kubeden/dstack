apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/routing/external-dns/base
  destination:
    namespace: external-dns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
