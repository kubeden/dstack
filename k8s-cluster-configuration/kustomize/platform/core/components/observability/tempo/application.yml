apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/observability/tempo/base
  destination:
    namespace: tempo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
