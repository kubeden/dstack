apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/observability/loki/base
  destination:
    namespace: loki
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
