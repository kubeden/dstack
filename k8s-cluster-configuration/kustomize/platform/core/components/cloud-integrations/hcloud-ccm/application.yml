apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hcloud-ccm
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/cloud-integrations/hcloud-ccm/base
  destination:
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
