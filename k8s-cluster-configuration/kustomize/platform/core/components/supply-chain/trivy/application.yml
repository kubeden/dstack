apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/supply-chain/trivy/base
  destination:
    namespace: trivy-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
