apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zot
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/supply-chain/zot/base
  destination:
    namespace: zot
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
