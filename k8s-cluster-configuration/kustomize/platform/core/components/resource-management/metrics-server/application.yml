apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  source:
    path: k8s-cluster-configuration/kustomize/platform/core/components/resource-management/metrics-server/base
  destination:
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
