apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-customer-application-01
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubeden/dstack.git
    targetRevision: main
    path: k8s-cluster-configuration/kustomize/applications/example-customer-01/example-customer-application-01/base
  destination:
    server: https://kubernetes.default.svc
    namespace: example-customer-application-01
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
