apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeden-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubeden/dstack.git
    targetRevision: main
    path: k8s-cluster-configuration/kustomize/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
