apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: company-example-application-02
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubeden/dstack.git
    targetRevision: main
    path: k8s-cluster-configuration/kustomize/applications/company-applications/example-application-02/base
  destination:
    server: https://kubernetes.default.svc
    namespace: company-example-application-02
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
